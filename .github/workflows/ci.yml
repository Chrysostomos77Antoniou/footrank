name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Analyze, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.6
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # Release build validates what debug can't: R8/minification + Dart AOT
      # compilation (debug uses the JIT VM and skips R8, so a green debug build
      # can still fail at release — as a real APIs-mismatch break did once).
      # No signing secrets needed: build.gradle.kts falls back to debug signing
      # when key.properties is absent.
      - name: Build release APK (validates R8 + AOT)
        run: flutter build apk --release
