name: Integration tests (emulator)

# Runs the integration_test suite on an Android emulator. Triggered manually,
# and on the QA loop's temporary branches (qa/**) — kept off normal PRs so it
# doesn't slow every change (emulator runs take ~15-20 min).
on:
  workflow_dispatch:
  push:
    branches: ["qa/**"]

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.6
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: flutter test integration_test
