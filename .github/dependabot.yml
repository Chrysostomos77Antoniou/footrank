# Keep dependencies patched and review security updates as PRs.
version: 2
updates:
  # Dart/Flutter packages (pubspec.yaml / pubspec.lock)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions used by the CI / security workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
