name: footrank
description: "FootRank - Football ranking and match tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  supabase_flutter: ^2.8.4
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  image_picker_android: ^0.8.12
  image_picker_platform_interface: ^2.10.0
  video_player: ^2.9.2
  url_launcher: ^6.3.0
  flutter_native_splash: ^2.4.3
  cached_network_image: ^3.4.1
  firebase_crashlytics: ^4.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.1

# App launcher icon (Image 1)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0B6E3D"
  adaptive_icon_foreground: "assets/branding/app_icon.png"

# Splash / loading screen (Image 2 lockup)
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/branding/splash_clean.png"
  color_dark: "#BFBFBF"
  image_dark: "assets/branding/splash_darkmode.png"
  android_12:
    image: "assets/branding/splash_clean.png"
    color: "#FFFFFF"
    image_dark: "assets/branding/splash_darkmode.png"
    color_dark: "#BFBFBF"

flutter:
  uses-material-design: true
  assets:
    - assets/video/auth_bg.mp4
